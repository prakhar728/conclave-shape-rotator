shape: "technical-demo-salon"
notes: |
  A loose salon session starts with setup and audio issues, then becomes a detailed DStack walkthrough led by Hang Yin, followed by Andrew Miller's demo of a DStack web host multiplexing layer and a discussion of private inference, service mesh, attestation, deployment ergonomics, and remaining security and governance questions.
