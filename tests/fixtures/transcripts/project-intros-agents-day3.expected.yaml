notes: |
  A long cohort project-introduction session with four agent-infrastructure demos, dense technical exposition, and peer critique around context management, confidential cohort analytics, routing work-in-public exhaust, and durable AI workflow orchestration. The register is exploratory and product-oriented: presenters describe prototypes and adoption signals, while the room probes trust models, privacy policy, evaluation, GTM, workflow ergonomics, and next steps.
