notes: |
  Hybrid register, decided after reading the file end-to-end:
    turns   0– 22 — Andrew Miller running ops/logistics on the day's
                    schedule (Christian, Chloe, Wiki travel; AV setup).
    turns  21–111 — Albiona Hoti pitches Elocute (her articulation-
                    practice app, 524 users, exploring monetization).
                    Deep audience Q&A, dominated by LSDan + shawmakesmagic.
    turns 112–138 — Wiki (wikigen) starts presenting; transcript cuts
                    off mid-pitch around biotech data discovery.
  Honest assessment: this is closer to project-intros register than the
  "operational sync" label I gave it in C1. Kept anyway because (a) the
  ops-sync opening exercises action-item extraction on real schedule
  logistics, (b) the Albiona Q&A has obligation-dense feature-request
  + monetization-decision content that Day-3 Agents doesn't show in the
  same depth, (c) re-swapping would burn the C2 budget further.

