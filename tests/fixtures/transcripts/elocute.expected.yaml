obligations:
  # ---- ops-sync section (turns 0–22) -------------------------------------
  - type: action
    description: "Andrew Miller will adjust the day's presenter schedule given Christian's absence and Chloe's remote/family situation — defer presenters who aren't ready and continue with whoever is."
    source_quote: "Abby was number three on the schedule. Ali is still rendering her slides, and Christian is not present yet, and Chloe hasn't joined, so you know, I guess maybe you're helping whoever is ready first."
    turn_ids: [8]
    owner_raw_text: "Andrew Miller"
    due_date_raw: null
    status_inferred: open

  - type: commitment
    description: "Wiki will email logistics for his flight to New York and stay in touch about scheduling his presentation."
    source_quote: "I'm trying to get to New York, though, so I'll just keep in touch by email, and then with presenting, if I have a little bit notice of when I'm put on the schedule, that'll also be really good."
    turn_ids: [7]
    owner_raw_text: "Wiki"
    due_date_raw: null
    status_inferred: open

  # ---- Albiona's Elocute pitch + Q&A (turns 22–111) ----------------------
  - type: decision
    description: "Albiona has set Elocute as her top priority for the Shape Rotator cohort."
    source_quote: "I'm going to, for this cohort, the main goal is, the top priority is Elocute app, which is an articulation, like practicing your articulation in like two to three minutes period of time."
    turn_ids: [21]
    owner_raw_text: "Albiona Hoti"
    due_date_raw: null
    status_inferred: open

  - type: decision
    description: "Albiona's monetization plan: ship the free version, get users hooked, then introduce a paywall in a redesigned version."
    source_quote: "My next process is going from people using something to needing something, and then adding a wall for payments there."
    turn_ids: [31]
    owner_raw_text: "Albiona Hoti"
    due_date_raw: null
    status_inferred: open

  - type: open_question
    description: "How can Albiona grow Elocute's user base — content positioning, finding indexable channels (e.g. subreddits)? She names this explicitly as her current bottleneck."
    source_quote: "My current bottom left is, how can I talk more about the app? How can I get more users? How can I position the app to be found by people who actually index?"
    turn_ids: [24]
    owner_raw_text: "Albiona Hoti"
    due_date_raw: null
    status_inferred: open

  - type: action
    description: "Albiona will build MCP integration for Elocute so users can practice articulation via their existing LLM chat threads."
    source_quote: "I will definitely do it right away, because I can get immediately people more like chatting to the whole LLMs and be like all the topics that they want to practice."
    turn_ids: [40]
    owner_raw_text: "Albiona Hoti"
    due_date_raw: null
    status_inferred: open

  - type: commitment
    description: "LSDan would pay for Elocute if he could upload his own pitch text (dynamic, written) and practice on it."
    source_quote: "I would pay for what it's worth, for first of all being put in my own pocket, and then maybe I'll set up a CTE server that subjects related to what I'm talking about, so that I can speak intelligently about such related to the product."
    turn_ids: [39]
    owner_raw_text: "LSDan"
    due_date_raw: null
    status_inferred: open

  - type: commitment
    description: "LSDan would also pay for narrower metrics and for higher usage caps over time."
    source_quote: "I'm probably willing to pay for the more narrow metrics, so more specific metrics, I'm also probably willing to pay for more use."
    turn_ids: [48]
    owner_raw_text: "LSDan"
    due_date_raw: null
    status_inferred: open

  - type: open_question
    description: "How do you actually enforce discipline — i.e. follow through on a decision once made — when it's tempting to drift into already-comfortable areas? Raised by Kristel; not resolved on call."
    source_quote: "You have decided something, but now I'm actually acting differently. What I was deciding, this is super important to put this detector in place, but how, how do we really do it?"
    turn_ids: [41]
    owner_raw_text: null
    due_date_raw: null
    status_inferred: open

  # ---- Wiki's wikigen pitch (turns 112–138, cut off) ---------------------
  - type: blocker
    description: "Wiki's screen-share / projection laptop ran out of power mid-presentation; the AV setup is unable to render his slides for several minutes."
    source_quote: "Our little presentation laptop just ran out of power, despite being plugged in. I don't know, it rung with a second."
    turn_ids: [128]
    owner_raw_text: "Andrew Miller"
    due_date_raw: null
    status_inferred: resolved

