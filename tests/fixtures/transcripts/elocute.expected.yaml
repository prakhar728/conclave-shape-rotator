  - type: action
    description: "Albiona needs to add support for users uploading or supplying their own practice tasks, pitches, or subject material."
    source_quote: "That's one of the requirements that I need to really say how to"
    turn_ids: [25, 27, 28, 39, 48]
    owner_raw_text: "Albiona Hoti"
    due_date_raw: null
    status_inferred: "open"
  - type: action
    description: "Albiona needs to turn Elocute from usage into revenue by adding a payment wall or subscription-style monetization."
    source_quote: "My next process is going from people using something to needing something, and then adding a wall for payments there."
    turn_ids: [29, 31, 44, 47, 48, 54, 56, 59, 60]
    owner_raw_text: "Albiona Hoti"
    due_date_raw: null
    status_inferred: "open"
  - type: commitment
    description: "Albiona intends to build an MCP-based flow so users can bring topics from their LLM conversations into Elocute."
    source_quote: "I've been exploring the MCP journey... I will definitely do it right away."
    turn_ids: [40]
    owner_raw_text: "Albiona Hoti"
    due_date_raw: null
    status_inferred: "open"
  - type: action
    description: "Albiona needs to create a callback or onboarding loop such as email, SMS, or dashboard reminders to bring users back after sign-up."
    source_quote: "Did I make a mistake online not having the company with email, so that people can come in."
    turn_ids: [24, 65, 66, 68, 70]
    owner_raw_text: "Albiona Hoti"
    due_date_raw: null
    status_inferred: "open"
  - type: commitment
    description: "Albiona wants to increase Elocute from about 500 users to 1000 users."
    source_quote: "For now I have 500 users and 134 power users. I want to increase this number to 1000."
    turn_ids: [24]
    owner_raw_text: "Albiona Hoti"
    due_date_raw: null
    status_inferred: "open"
  - type: open_question
    description: "The group raises whether Elocute should handle higher-stakes private or company data and how that privacy story should be communicated."
    source_quote: "It all depends on the stakes, if for them it's high stakes like fascinating, then they would hear."
    turn_ids: [104, 105, 106, 107]
    owner_raw_text: null
    due_date_raw: null
    status_inferred: "open"
  - type: action
    description: "Albiona needs to sharpen Elocute's positioning around the user's insecurity, desire, or concrete public-speaking outcome."
    source_quote: "What is their deep like insecurity or fear, desire or want, and then you're just like public speaking is the solution to that."
    turn_ids: [45, 75, 94, 98]
