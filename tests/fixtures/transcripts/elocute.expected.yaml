obligations:
  - type: commitment
    description: "Wiki will keep the organizers updated by email while sorting out travel and flight dates."
    source_quote: "I'm trying to get to New York, though, so I'll just keep in touch by email."
    turn_ids: [7]
    owner_raw_text: "Wiki"
    due_date_raw: null
