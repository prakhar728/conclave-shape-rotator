services:
  conclave:
    # Pin via IMAGE_TAG env var (set in .env to the desired tag — usually a
    # short git SHA so each deploy changes the image reference and forces
    # Phala to re-pull. `:latest` gets deduped on the platform side.)
    image: prakharojha/conclave:${IMAGE_TAG:-latest}
    ports:
      - "8000:8000"
    restart: always
    environment:
      # BLAS / tokenizer thread pinning — avoids the OpenMP/MKL clash that's
      # caused intermittent native crashes on macOS. On Linux it's a no-op
      # at worst and keeps CPU usage predictable on the 1-vCPU CVM.
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      TOKENIZERS_PARALLELISM: "false"
      KMP_DUPLICATE_LIB_OK: "TRUE"
      # Enables real TDX attestation via the dstack agent; falls back to a
      # tagged stub if the agent is unreachable.
      IN_TEE: "true"
      # Optional override list (comma-separated). Leave unset to use the
      # built-in default candidates.
      DSTACK_AGENT_URL: ${DSTACK_AGENT_URL:-}
      # Skill / LLM config — pulled from --env-file at deploy time
      CONCLAVE_NEARAI_API_KEY: ${CONCLAVE_NEARAI_API_KEY:-}
      CONCLAVE_DEFAULT_MODEL: ${CONCLAVE_DEFAULT_MODEL:-deepseek-ai/DeepSeek-V3.1}
      CONCLAVE_SUPABASE_URL: ${CONCLAVE_SUPABASE_URL:-}
      CONCLAVE_SUPABASE_ANON_KEY: ${CONCLAVE_SUPABASE_ANON_KEY:-}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-conclave-eval}
      # Solana attestation (optional — leaves /attestations/publish in dry-run
      # mode if unset)
      CONCLAVE_SOLANA_KEYPAIR: ${CONCLAVE_SOLANA_KEYPAIR:-}
      CONCLAVE_SOLANA_NETWORK: ${CONCLAVE_SOLANA_NETWORK:-devnet}
      CONCLAVE_SOLANA_RPC_URL: ${CONCLAVE_SOLANA_RPC_URL:-}
      # Public URL embedded in CreateInstanceResponse.enclave_url. Phala assigns
      # this per CVM; set to the dstack-pha-prod5.phala.network host of the
      # deployed instance.
      CONCLAVE_PUBLIC_URL: ${CONCLAVE_PUBLIC_URL:-}
      # LLM backend (RedPill TEE — alternative to NEAR AI)
      CONCLAVE_LLM_BACKEND: ${CONCLAVE_LLM_BACKEND:-}
      CONCLAVE_REDPILL_API_KEY: ${CONCLAVE_REDPILL_API_KEY:-}
      CONCLAVE_REDPILL_MODEL: ${CONCLAVE_REDPILL_MODEL:-}
      # Live RedPill host is api.redpill.ai (NO hyphen). Default in code is now correct, but keep the
      # override wired so a host move is a one-line env change, not an image rebuild.
      CONCLAVE_REDPILL_BASE_URL: ${CONCLAVE_REDPILL_BASE_URL:-}
      CONCLAVE_DISABLE_SCHEDULER: ${CONCLAVE_DISABLE_SCHEDULER:-}
      # Capture integration
      CONCLAVE_INGEST_SECRET_CAPTURE: ${CONCLAVE_INGEST_SECRET_CAPTURE:-}
      CAPTURE_API_BASE_URL: ${CAPTURE_API_BASE_URL:-}
      CAPTURE_MEETING_COMPLETED_URL: ${CAPTURE_MEETING_COMPLETED_URL:-}
      CAPTURE_API_TOKEN: ${CAPTURE_API_TOKEN:-}
      CONCLAVE_BOT_AUTHENTICATED: ${CONCLAVE_BOT_AUTHENTICATED:-}
      # Google (calendar / sign-in)
      CONCLAVE_GOOGLE_CLIENT_ID: ${CONCLAVE_GOOGLE_CLIENT_ID:-}
      CONCLAVE_GOOGLE_CLIENT_SECRET: ${CONCLAVE_GOOGLE_CLIENT_SECRET:-}
      CONCLAVE_GOOGLE_REDIRECT_URI: ${CONCLAVE_GOOGLE_REDIRECT_URI:-}
      CONCLAVE_CALENDAR_POST_CONNECT_URL: ${CONCLAVE_CALENDAR_POST_CONNECT_URL:-}
      CONCLAVE_TOKEN_ENC_KEY: ${CONCLAVE_TOKEN_ENC_KEY:-}
      # FPM (VFTE) integration — Conclave→FPM diarize + identify + knowledge
      CONCLAVE_FPM_BASE_URL: ${CONCLAVE_FPM_BASE_URL:-}
      CONCLAVE_FPM_API_TOKEN: ${CONCLAVE_FPM_API_TOKEN:-}
      CONCLAVE_FPM_WORKSPACE: ${CONCLAVE_FPM_WORKSPACE:-}
      # NEAR Whisper transcription (record-flow ASR)
      CONCLAVE_TRANSCRIPTION_SERVICE_URL: ${CONCLAVE_TRANSCRIPTION_SERVICE_URL:-}
      CONCLAVE_TRANSCRIPTION_SERVICE_TOKEN: ${CONCLAVE_TRANSCRIPTION_SERVICE_TOKEN:-}
      CONCLAVE_TRANSCRIPTION_MODEL: ${CONCLAVE_TRANSCRIPTION_MODEL:-}
      # ── Task #16: durable job queue + HTTP-fronted diarize claim (Option A) ──────────────────
      # Redis is CO-LOCATED below (private to this CVM's compose network). Both the in-process
      # conclave_jobs worker and the diarize submit/claim path use it. Default points at that service.
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # "queue" → finalize submits a durable diarize job (remote DiariZen worker pulls it over HTTPS);
      # "blocking" → legacy in-process call. ON for the live #16 round.
      CONCLAVE_DIARIZE_JOBS: ${CONCLAVE_DIARIZE_JOBS:-blocking}
      # Master switch for the Conclave-internal queue (enrich/regen/KB) → retry + dead-letter durability.
      CONCLAVE_JOBS_QUEUE: ${CONCLAVE_JOBS_QUEUE:-}
      # Where the remote worker POSTs the diarization result (this CVM's own PUBLIC gateway URL).
      CONCLAVE_DIARIZE_RESULT_CALLBACK_URL: ${CONCLAVE_DIARIZE_RESULT_CALLBACK_URL:-}
      # Worker service token — gates /result AND the /jobs/claim + /jobs/{id}/heartbeat endpoints.
      CONCLAVE_DIARIZE_RESULT_TOKEN: ${CONCLAVE_DIARIZE_RESULT_TOKEN:-}
      # Audio-by-reference: base URL the worker GETs the recording from (this CVM's public gateway).
      CONCLAVE_AUDIO_FETCH_URL: ${CONCLAVE_AUDIO_FETCH_URL:-}
      CONCLAVE_AUDIO_FETCH_TOKEN: ${CONCLAVE_AUDIO_FETCH_TOKEN:-}
      # Where assembled recordings live (on the persistent conclave-data volume) — served to the worker.
      CONCLAVE_AUDIO_DIR: ${CONCLAVE_AUDIO_DIR:-/app/data/audio}
    depends_on:
      - redis
    volumes:
      # Persist SQLite + mock fixtures across CVM restarts.
      - conclave-data:/app/data
      # dstack agent socket — required for real TDX attestation quotes via
      # the dstack-sdk DstackClient (dstack-os 0.5.x).
      - /var/run/dstack.sock:/var/run/dstack.sock

  # Task #16 — co-located Redis (durable job queue + the in-person live-segment stream). Private to
  # this CVM's compose network; NO published port. Two clients reach it over the compose net (conclave
  # + capture-diart below); the REMOTE GPU DiariZen worker reaches the queue over the HTTP-fronted claim
  # endpoints, not Redis. In-RAM only: jobs are short-lived + re-submittable, and the recording (the
  # only durable artifact) lives on the conclave-data volume, not in Redis.
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    restart: always

  # In-person LIVE diarization (the WS the browser Record button streams to). CO-LOCATED here because
  # it publishes segments straight onto the SAME Redis Conclave consumes (`transcription_segments`) —
  # a separate CVM couldn't reach this CVM's private Redis. It diarizes live (diart) + ASRs each span
  # (NEAR Whisper) and uploads the recording + fires the finalize webhook back to conclave over the
  # compose net. Its WS port is published so the browser can reach it over WSS via the Phala gateway.
  # NOTE: diart loads gated pyannote/segmentation-3.0 → it needs HF_TOKEN at RUNTIME (unlike DiariZen).
  capture-diart:
    image: prakharojha/capture-diarize-diart:${CAPTURE_DIART_TAG:-v1}
    command: ["uvicorn", "service:app", "--host", "0.0.0.0", "--port", "8086"]
    ports:
      - "8087:8086"        # browser → wss://<conclave-app-id>-8087.dstack-pha-prod5.phala.network/inperson
    depends_on:
      - redis
    environment:
      CAPTURE_DIARIZER: diart
      CAPTURE_DIARIZE_TOKEN: ${CAPTURE_DIARIZE_TOKEN:-}                 # == browser NEXT_PUBLIC_CAPTURE_DIARIZE_TOKEN
      HF_TOKEN: ${HF_TOKEN:-}                                          # REQUIRED: gated pyannote/segmentation-3.0
      CAPTURE_REDIS_URL: ${CAPTURE_REDIS_URL:-redis://redis:6379/0}     # publish onto the stream conclave consumes
      CAPTURE_SEGMENT_STREAM: ${CAPTURE_SEGMENT_STREAM:-transcription_segments}
      CAPTURE_CONCLAVE_AUDIO_CHUNK_URL: ${CAPTURE_CONCLAVE_AUDIO_CHUNK_URL:-http://conclave:8000/api/capture/audio-chunk}
      CAPTURE_CONCLAVE_WEBHOOK_URL: ${CAPTURE_CONCLAVE_WEBHOOK_URL:-http://conclave:8000/api/webhooks/capture/meeting-completed}
      CAPTURE_TRANSCRIPTION_SERVICE_URL: ${CONCLAVE_TRANSCRIPTION_SERVICE_URL:-}
      CAPTURE_TRANSCRIPTION_SERVICE_TOKEN: ${CONCLAVE_TRANSCRIPTION_SERVICE_TOKEN:-}
      CAPTURE_TRANSCRIPTION_MODEL: ${CONCLAVE_TRANSCRIPTION_MODEL:-openai/whisper-large-v3}
      OMP_NUM_THREADS: "2"
      MKL_NUM_THREADS: "2"
    restart: always

volumes:
  conclave-data:
